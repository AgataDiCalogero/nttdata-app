<div
  class="app-search"
  [class.app-search--wide]="isWide()"
  [class.app-search--compact]="isCompact()"
  [class.app-search--small]="isSmall()"
  [class.app-search--full]="isFull()"
>
  <label [attr.for]="control() ? inputId() : null">{{ labelText() }}</label>
  <lucide-icon [img]="Search" class="app-search__icon" aria-hidden="true"></lucide-icon>

  @if (control(); as ctrl) {
    <input
      type="search"
      class="app-search__input"
      placeholder="{{ placeholder() }}"
      title="{{ labelText() }}"
      aria-label="{{ labelText() }}"
      id="{{ inputId() }}"
      [formControl]="ctrl"
      [appDebounceInput]="debounceTime()"
      (debounced)="onDebounced($event)"
    />
  } @else {
    <input
      type="search"
      class="app-search__input"
      placeholder="{{ placeholder() }}"
      title="{{ labelText() }}"
      aria-label="{{ labelText() }}"
      [appDebounceInput]="debounceTime()"
      (debounced)="onDebounced($event)"
    />
  }
</div>
