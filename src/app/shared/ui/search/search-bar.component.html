<mat-form-field
  class="app-search-field"
  appearance="outline"
  color="accent"
  [floatLabel]="'always'"
  [class.app-search-field--wide]="isWide()"
  [class.app-search-field--compact]="isCompact()"
  [class.app-search-field--small]="isSmall()"
  [class.app-search-field--full]="isFull()"
>
  <mat-label>{{ labelText() }}</mat-label>

  <lucide-icon matPrefix [img]="Search" class="app-search__icon" aria-hidden="true"></lucide-icon>

  @if (control(); as ctrl) {
    <input
      matInput
      type="search"
      class="app-search__input"
      [placeholder]="placeholder()"
      [attr.aria-label]="labelText()"
      [id]="inputId()"
      [formControl]="ctrl"
      [appDebounceInput]="debounceTime()"
      (debounced)="onDebounced($event)"
    />
  } @else {
    <input
      matInput
      type="search"
      class="app-search__input"
      [placeholder]="placeholder()"
      [attr.aria-label]="labelText()"
      [appDebounceInput]="debounceTime()"
      (debounced)="onDebounced($event)"
    />
  }
</mat-form-field>
