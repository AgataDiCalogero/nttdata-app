<ul class="toast-list">
  @for (toast of toasts(); track toast.id) {
    <li class="toast toast--{{ toast.type }}">
      <output class="toast__text" aria-live="polite">{{ toast.text }}</output
      ><button
        type="button"
        class="toast__close"
        (click)="dismiss(toast.id)"
        aria-label="Dismiss notification"
      >
        &times;
      </button>
    </li>
  }
</ul>
