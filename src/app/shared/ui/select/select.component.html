@if (label()) {
  <label [for]="resolvedId()" class="select-label">{{ label() }}</label>
}
@if (control(); as ctrl) {
  <select
    class="select"
    [class.select--in-modal]="isInModal"
    [class.select--compact]="variant() === 'compact'"
    [id]="resolvedId()"
    title="Select option"
    [attr.aria-label]="ariaLabel() || label() || placeholder() || 'Select option'"
    [attr.aria-describedby]="ariaDescribedBy() || null"
    [formControl]="ctrl"
    [required]="required()"
    (change)="onChange($event)"
  >
    @if (placeholder() && showPlaceholder()) {
      <option value="">{{ placeholder() }}</option>
    }
    @for (option of options(); track option.value) {
      <option [value]="option.value">
        {{ option.label }}
      </option>
    }
  </select>
}
@if (label() && !control()) {
  <label [for]="resolvedId()" class="select-label">{{ label() }}</label>
}
@if (!control()) {
  <select
    class="select"
    [class.select--in-modal]="isInModal"
    [class.select--compact]="variant() === 'compact'"
    [id]="resolvedId()"
    title="Select option"
    [attr.aria-label]="ariaLabel() || label() || placeholder() || 'Select option'"
    [attr.aria-describedby]="ariaDescribedBy() || null"
    [disabled]="disabled()"
    [required]="required()"
    (change)="onChange($event)"
  >
    @if (placeholder() && showPlaceholder()) {
      <option value="">{{ placeholder() }}</option>
    }
    @for (option of options(); track option.value) {
      <option [value]="option.value">
        {{ option.label }}
      </option>
    }
  </select>
}
