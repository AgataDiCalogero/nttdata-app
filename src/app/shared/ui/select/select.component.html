@if (label()) {
  <label [for]="id() || 'select-control'" class="select-label">{{ label() }}</label>
}
@if (control()) {
  <select
    class="select"
    [class.select--compact]="variant() === 'compact'"
    [id]="id() || 'select-control'"
    title="Select option"
    [attr.aria-label]="placeholder() || label() || 'Select option'"
    [formControl]="$any(control())"
    [required]="required()"
    (change)="onChange($event)"
  >
    @if (placeholder() && showPlaceholder()) {
      <option value="">{{ placeholder() }}</option>
    }
    @for (option of options(); track option.value) {
      <option [value]="$any(option.value)">
        {{ option.label }}
      </option>
    }
  </select>
}
@if (label() && !control()) {
  <label [for]="id() || 'select-no-control'" class="select-label">{{ label() }}</label>
}
@if (!control()) {
  <select
    class="select"
    [class.select--compact]="variant() === 'compact'"
    [id]="id() || 'select-no-control'"
    title="Select option"
    [attr.aria-label]="placeholder() || label() || 'Select option'"
    [disabled]="disabled()"
    [required]="required()"
    (change)="onChange($event)"
  >
    @if (placeholder() && showPlaceholder()) {
      <option value="">{{ placeholder() }}</option>
    }
    @for (option of options(); track option.value) {
      <option [value]="$any(option.value)">
        {{ option.label }}
      </option>
    }
  </select>
}
