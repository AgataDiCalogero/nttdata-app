<mat-toolbar class="app-navbar" color="primary">
  @if (isLogged()) {
    <button
      mat-icon-button
      class="menu-trigger"
      type="button"
      aria-label="Apri navigazione"
      [matMenuTriggerFor]="navMenu"
      (menuOpened)="onMenuOpened()"
      (menuClosed)="onMenuClosed()"
    >
      <mat-icon svgIcon="lucide:menu" aria-hidden="true"></mat-icon>
    </button>
  }

  <a class="brand" routerLink="/" (click)="closeMenu()">
    <img
      ngSrc="assets/logo.svg"
      alt="NTT Data"
      class="brand__logo"
      width="40"
      height="40"
      priority
    />
    <span class="brand__label">NTT Data App</span>
  </a>

  <nav class="nav-links" role="navigation" aria-label="Navigazione principale">
    @if (!isLogged() && !isLoginRoute()) {
      <a mat-button routerLink="/login" (click)="closeMenu()">Login</a>
    }
    @if (isLogged()) {
      <a
        mat-button
        routerLink="/users"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
      >
        <mat-icon svgIcon="lucide:users" aria-hidden="true"></mat-icon>
        <span>Users</span>
      </a>
      <a
        mat-button
        routerLink="/posts"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
      >
        <mat-icon svgIcon="lucide:posts" aria-hidden="true"></mat-icon>
        <span>Posts</span>
      </a>
    }
  </nav>

  <span class="spacer" aria-hidden="true"></span>

  <div class="controls">
    <app-appearance-switcher aria-haspopup="true"></app-appearance-switcher>

    @if (isLogged()) {
      <button mat-flat-button color="accent" type="button" class="logout-btn" (click)="logout()">
        <mat-icon svgIcon="lucide:log-out" aria-hidden="true"></mat-icon>
        <span class="logout-text">Logout</span>
      </button>
    }
  </div>
</mat-toolbar>

<mat-menu #navMenu="matMenu" class="nav-menu">
  @if (!isLogged() && !isLoginRoute()) {
    <button mat-menu-item routerLink="/login" (click)="closeMenu()">Login</button>
  }
  @if (isLogged()) {
    <button mat-menu-item routerLink="/users" (click)="closeMenu()">
      <mat-icon svgIcon="lucide:users" aria-hidden="true"></mat-icon>
      <span>Users</span>
    </button>
    <button mat-menu-item routerLink="/posts" (click)="closeMenu()">
      <mat-icon svgIcon="lucide:posts" aria-hidden="true"></mat-icon>
      <span>Posts</span>
    </button>
  }
</mat-menu>
