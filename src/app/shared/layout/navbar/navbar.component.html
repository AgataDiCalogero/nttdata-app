<mat-toolbar class="app-navbar" color="primary">
  <a class="brand" routerLink="/" (click)="closeMenu()">
    <img
      ngSrc="assets/logo.svg"
      alt="NTT Data"
      class="brand__logo"
      width="40"
      height="40"
      priority
    />
    <span class="brand__label">NTT Data App</span>
  </a>

  <nav class="nav-links" role="navigation" aria-label="Navigazione principale">
    @if (!isLoginRoute() && !isMobile()) {
      @if (!isLogged()) {
        <a appButton variant="ghost" routerLink="/login" (click)="closeMenu()">Login</a>
      }

      @if (isLogged()) {
        <a
          appButton
          variant="ghost"
          routerLink="/users"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon svgIcon="lucide:users" aria-hidden="true"></mat-icon>
          <span>Users</span>
        </a>
        <a
          appButton
          variant="ghost"
          routerLink="/posts"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <mat-icon svgIcon="lucide:posts" aria-hidden="true"></mat-icon>
          <span>Posts</span>
        </a>
      }
    }
  </nav>

  <span class="spacer" aria-hidden="true"></span>

  <div class="controls">
    <div class="toolbar-menu-trigger">
      <app-appearance-switcher aria-haspopup="true"></app-appearance-switcher>

      @if (!isLoginRoute() && isLogged()) {
        <button appButton variant="secondary" type="button" class="logout-btn" (click)="logout()">
          <mat-icon svgIcon="lucide:log-out" aria-hidden="true"></mat-icon>
          <span class="logout-text sr-only">Logout</span>
        </button>
      }
    </div>
  </div>
</mat-toolbar>

<!-- Floating hamburger menu - only on mobile, only when logged, never on login -->
@if (!isLoginRoute() && isLogged() && isMobile()) {
  <button
    appButton
    [iconOnly]="true"
    variant="secondary"
    class="floating-menu-trigger"
    type="button"
    aria-label="Apri navigazione"
    [matMenuTriggerFor]="navMenu"
    [attr.aria-controls]="navMenu?.panelId"
    [attr.aria-expanded]="menuOpen() ? 'true' : 'false'"
    (menuOpened)="onMenuOpened()"
    (menuClosed)="onMenuClosed()"
  >
    <lucide-icon [img]="Menu" aria-hidden="true"></lucide-icon>
  </button>
}

<mat-menu
  #navMenu="matMenu"
  class="nav-menu"
  [yPosition]="isMobile() ? 'above' : 'below'"
  [overlapTrigger]="false"
>
  @if (!isLoginRoute()) {
    @if (!isLogged()) {
      <button mat-menu-item routerLink="/login" (click)="closeMenu()">Login</button>
    }
    @if (isLogged()) {
      <button mat-menu-item routerLink="/users" routerLinkActive="active" (click)="closeMenu()">
        <mat-icon svgIcon="lucide:users" aria-hidden="true"></mat-icon>
        <span>Users</span>
      </button>
      <button mat-menu-item routerLink="/posts" routerLinkActive="active" (click)="closeMenu()">
        <mat-icon svgIcon="lucide:posts" aria-hidden="true"></mat-icon>
        <span>Posts</span>
      </button>
    }
  }
</mat-menu>
