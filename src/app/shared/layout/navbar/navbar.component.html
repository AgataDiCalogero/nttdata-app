<header class="app-navbar">
  <div class="brand">
    <img
      ngSrc="assets/logo.svg"
      alt="NTT Data"
      class="brand__logo"
      width="40"
      height="40"
      priority
    />
    <h1>NTT Data App</h1>
  </div>
  <div class="nav-wrapper">
    <nav id="main-nav" role="navigation" aria-label="Main navigation">
      @if (!isLogged() && !isLoginRoute()) {
        <a routerLink="/login" (click)="closeMenu()">Login</a>
      }
      @if (isLogged()) {
        <a
          routerLink="/users"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
          >Users</a
        >
        <a
          routerLink="/posts"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
          >Posts</a
        >
      }
    </nav>
  </div>
  <!-- Mobile menu toggle -->
  @if (isLogged()) {
    <button
      class="menu-toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="main-nav"
      aria-label="Toggle navigation"
      (click)="toggleMenu()"
    >
      <span class="menu-icon" aria-hidden="true"></span>
    </button>
  }

  <!-- overlay shown when mobile menu is open -->
  @if (menuOpen()) {
    <div
      class="mobile-overlay"
      (click)="closeMenu()"
      aria-hidden="true"
      tabindex="-1"
    ></div>
  }
  <div class="controls">
    <div class="controls__group">
      <app-appearance-switcher aria-haspopup="true"></app-appearance-switcher>
    </div>
    <!-- Show logout when user is authenticated: visible, with icon + text -->
    @if (isLogged()) {
      <button
        type="button"
        appButton
        variant="secondary"
        size="sm"
        class="logout-btn"
        (click)="logout()"
        aria-label="Logout"
      >
        <lucide-icon [img]="LogOut" aria-hidden="true"></lucide-icon>
        <span class="logout-text">Logout</span>
      </button>
    }
  </div>
</header>
