<header class="app-navbar">
  <a class="brand" routerLink="/" aria-label="NTT Data Home">
    <img src="assets/logo.svg" alt="NTT Data" class="brand__logo" width="40" height="40" />
    <h1>NTT Data App</h1>
  </a>
  <nav role="navigation" aria-label="Main navigation">
    @if (!isLogged() && !isLoginRoute()) {
      <a routerLink="/login" (click)="closeMenu()">Login</a>
    }
    @if (isLogged()) {
      <a
        routerLink="/users"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
        >Users</a
      >
      <a
        routerLink="/posts"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
        >Posts</a
      >
    }
  </nav>
  <!-- Mobile menu toggle -->
  @if (isLogged()) {
    <button
      class="menu-toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation"
      (click)="toggleMenu()"
    >
      <span class="menu-icon" aria-hidden="true"></span>
    </button>
  }

  <!-- overlay shown when mobile menu is open -->
  @if (menuOpen()) {
    <div class="mobile-overlay" (click)="closeMenu()" aria-hidden="true"></div>
  }
  <div class="controls">
    <app-appearance-switcher></app-appearance-switcher>
    <!-- Show logout when user is authenticated -->
    @if (isLogged()) {
      <button appButton variant="secondary" size="sm" (click)="logout()" aria-label="Logout">
        Logout
      </button>
    }
  </div>
</header>
