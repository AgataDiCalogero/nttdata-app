<div
  class="appearance-switcher"
  [attr.data-open]="menuOpen()"
  appClickOutside
  (appClickOutside)="onDocumentClick()"
  appEscapeKey
  (appEscapeKey)="onEscape()"
>
  <button
    type="button"
    class="appearance-switcher__trigger"
    id="appearance-switcher-trigger"
    (click)="toggleMenu()"
    [attr.aria-expanded]="menuOpen() ? 'true' : 'false'"
    aria-haspopup="true"
    [attr.aria-controls]="menuOpen() ? 'appearance-switcher-menu' : null"
    aria-label="Open appearance settings"
  >
    <span class="appearance-switcher__icon">
      <lucide-icon [img]="currentIcon()" aria-hidden="true"></lucide-icon>
    </span>
  </button>

  @if (menuOpen()) {
    <div
      class="appearance-switcher__panel"
      id="appearance-switcher-menu"
      aria-labelledby="appearance-switcher-trigger"
    >
      <div class="appearance-switcher__section">
        <fieldset class="appearance-switcher__options" aria-label="Theme options">
          <legend class="visually-hidden">Theme options</legend>

          <label class="appearance-option" [class.appearance-option--active]="isLightPreference()">
            <input
              type="radio"
              name="theme-preference"
              value="light"
              [checked]="isLightPreference()"
              (change)="setPreference('light')"
              class="visually-hidden"
            />
            <span class="appearance-option__icon">
              <lucide-icon [img]="Sun" aria-hidden="true"></lucide-icon>
            </span>
            <span class="appearance-option__label">Light</span>
          </label>

          <label class="appearance-option" [class.appearance-option--active]="isDarkPreference()">
            <input
              type="radio"
              name="theme-preference"
              value="dark"
              [checked]="isDarkPreference()"
              (change)="setPreference('dark')"
              class="visually-hidden"
            />
            <span class="appearance-option__icon">
              <lucide-icon [img]="Moon" aria-hidden="true"></lucide-icon>
            </span>
            <span class="appearance-option__label">Dark</span>
          </label>

          <label class="appearance-option" [class.appearance-option--active]="isSystemPreference()">
            <input
              type="radio"
              name="theme-preference"
              value="system"
              [checked]="isSystemPreference()"
              (change)="setPreference('system')"
              class="visually-hidden"
            />
            <span class="appearance-option__icon">
              <lucide-icon [img]="Monitor" aria-hidden="true"></lucide-icon>
            </span>
            <span class="appearance-option__label">System</span>
          </label>
        </fieldset>
      </div>

      <div class="appearance-switcher__divider"></div>

      <div class="appearance-switcher__section">
        <div class="appearance-option appearance-option--toggle">
          <span class="appearance-option__icon">
            <lucide-icon [img]="BookOpenCheck" aria-hidden="true"></lucide-icon>
          </span>
          <span class="appearance-option__label">Reading mode</span>
          <mat-slide-toggle
            class="appearance-toggle"
            aria-label="Reading mode"
            [checked]="isReadingMode()"
            (change)="toggleReadingMode()"
          ></mat-slide-toggle>
        </div>
      </div>
    </div>
  }
</div>
