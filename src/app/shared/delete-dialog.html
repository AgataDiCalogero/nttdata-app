<div class="dialog-backdrop" role="dialog" aria-modal="true">
  <div class="dialog">
    <h3>Confirm Deletion</h3>
    <p>
      Are you sure you want to delete <strong>{{ entityName }}</strong
      >?
    </p>

    <div class="actions">
      <button (click)="onCancel()" aria-label="Cancel deletion">Cancel</button>
      <button (click)="onConfirm()" class="danger" aria-label="Confirm deletion">Delete</button>
    </div>
  </div>
</div>
