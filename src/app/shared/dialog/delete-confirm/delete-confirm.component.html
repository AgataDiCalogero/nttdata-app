<section class="delete-confirm">
  <div class="delete-confirm__icon">
    <mat-icon svgIcon="lucide:alert-triangle" aria-hidden="true"></mat-icon>
  </div>

  <h2 class="delete-confirm__title">{{ data.title }}</h2>
  <p class="delete-confirm__message">{{ data.message }}</p>

  @if (errorMessage(); as error) {
    <div class="delete-confirm__status" role="alert">
      <mat-icon svgIcon="lucide:alert-circle" aria-hidden="true"></mat-icon>
      <span>{{ error }}</span>
    </div>
  }

  <div class="delete-confirm__actions">
    <button
      type="button"
      mat-button
      (click)="cancel()"
      [disabled]="submitting()"
    >
      {{ data.cancelText || 'Cancel' }}
    </button>
    <button
      type="button"
      mat-flat-button
      color="warn"
      (click)="confirm()"
      [disabled]="submitting()"
    >
      @if (submitting()) {
        <mat-progress-spinner
          mode="indeterminate"
          diameter="18"
          strokeWidth="2"
        ></mat-progress-spinner>
      }
      <mat-icon svgIcon="lucide:trash-2" aria-hidden="true"></mat-icon>
      <span>{{ confirmLabel() }}</span>
    </button>
  </div>
</section>
