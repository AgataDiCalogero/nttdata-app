<div class="delete-confirm">
  <h2>{{ data.title }}</h2>
  <p class="delete-confirm__message">{{ data.message }}</p>

  <div class="delete-confirm__actions">
    <button type="button" appButton variant="secondary" class="btn" (click)="cancel()">
      {{ data.cancelText || 'Cancel' }}
    </button>
    <button type="button" appButton variant="danger" class="btn" (click)="confirm()">
      {{ data.confirmText || 'Delete' }}
    </button>
  </div>
</div>
