<section class="login-page" data-app-page="true">
  <div class="login-container app-container">
    <mat-card class="login-card">
      <div class="login-card__icon">
        <mat-icon svgIcon="lucide:lock" aria-hidden="true"></mat-icon>
      </div>
      <h1 class="login-card__title">Welcome back</h1>
      <p class="login-card__subtitle">Enter your access token to continue.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="login-form">
        @let tokenError = tokenErrorMessage();

        <mat-form-field
          appearance="outline"
          color="accent"
          class="login-field"
          floatLabel="always"
          [class.login-field--invalid]="showTokenInvalidState()"
        >
          <mat-label>Access token</mat-label>
          <input
            matInput
            type="password"
            formControlName="token"
            autocomplete="off"
            placeholder="Paste your personal access token"
            [attr.aria-invalid]="showTokenInvalidState() ? 'true' : null"
            [attr.aria-describedby]="tokenError ? tokenErrorId : null"
          />
          <mat-icon matSuffix svgIcon="lucide:key" aria-hidden="true"></mat-icon>
          @if (tokenError) {
            <mat-error [id]="tokenErrorId">{{ tokenError }}</mat-error>
          }
        </mat-form-field>

        <!-- Global submission messages are shown via ToastService to avoid duplicate UIs -->

        <div class="login-actions">
          <button
            appButton
            variant="primary"
            type="submit"
            class="login-actions__submit"
            [disabled]="loading() || form.invalid"
          >
            @if (loading()) {
              <mat-progress-spinner
                mode="indeterminate"
                diameter="18"
                strokeWidth="2"
              ></mat-progress-spinner>
            }
            <span>Sign in</span>
          </button>

          <button
            appButton
            variant="ghost"
            type="button"
            class="login-actions__help"
            (click)="openTokenHelp()"
            [disabled]="loading()"
          >
            Lost your token?
          </button>
        </div>
      </form>
    </mat-card>
  </div>
</section>
