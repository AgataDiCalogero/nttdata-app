<div class="login-page">
  <div class="login-card">
    <!-- Icon/Logo -->
    <div class="icon-wrapper">
      <div class="icon-container">
        <svg
          class="lock-icon"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          ></path>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h2 class="title">Welcome back</h2>
    <p class="subtitle">Enter your access token to continue.</p>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="token" class="form-label">Access token</label>
        <input
          type="password"
          id="token"
          [(ngModel)]="token"
          name="token"
          placeholder="Paste your personal access token"
          class="form-input"
          [disabled]="loading()"
          autocomplete="off"
          required
        />
      </div>

      @if (errorMessage(); as error) {
        <app-alert variant="error">
          <svg
            alert-icon
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="10" cy="10" r="8"></circle>
            <line x1="10" y1="6" x2="10" y2="10"></line>
            <line x1="10" y1="13" x2="10.01" y2="13"></line>
          </svg>
          {{ error }}
        </app-alert>
      }

      <button
        type="submit"
        appButton
        variant="primary"
        [fullWidth]="true"
        [loading]="loading()"
        [disabled]="loading()"
      >
        Sign in
      </button>
    </form>

    <!-- Footer -->
    <div class="footer">
      <button type="button" class="forgot-link" (click)="openTokenHelp()">Lost your token?</button>
    </div>
  </div>
</div>
