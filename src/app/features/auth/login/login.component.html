<div class="login-page">
  <div class="login-card">
    <!-- Icon/Logo -->
    <div class="icon-wrapper">
      <div class="icon-container">
        <svg
          class="lock-icon"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          ></path>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h2 class="title">Welcome back</h2>
    <p class="subtitle">Enter your access token to continue.</p>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form" novalidate>
      @let tokenError = tokenErrorMessage();

      <div class="form-group" [class.is-invalid]="showTokenInvalidState()">
        <label for="token" class="form-label">Access token</label>
        <input
          type="password"
          id="token"
          formControlName="token"
          placeholder="Paste your personal access token"
          class="form-input"
          [disabled]="loading()"
          autocomplete="off"
          [attr.aria-invalid]="showTokenInvalidState() ? 'true' : 'false'"
          [attr.aria-describedby]="tokenError ? tokenErrorId : null"
        />

        @if (tokenError) {
          <p class="field-error" [id]="tokenErrorId" role="alert">{{ tokenError }}</p>
        }
      </div>

      @if (submissionMessage(); as message) {
        <p class="form-error" role="alert">{{ message }}</p>
      }

      <button
        type="submit"
        appButton
        variant="primary"
        [fullWidth]="true"
        [loading]="loading()"
        [disabled]="loading() || form.invalid"
      >
        Sign in
      </button>
    </form>

    <!-- Footer -->
    <div class="footer">
      <button type="button" class="forgot-link" (click)="openTokenHelp()">Lost your token?</button>
    </div>
  </div>
</div>
