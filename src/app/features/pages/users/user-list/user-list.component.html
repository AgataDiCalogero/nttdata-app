<div class="user-list">
  @for (user of items(); track trackById($index, user)) {
    <mat-card class="user-card">
      <mat-card-header>
        <div class="user-card__heading">
          <div mat-card-avatar class="user-card__avatar" aria-hidden="true">
            {{ initials(user) }}
          </div>
          <div class="user-card__title-wrapper">
            <mat-card-title>{{ user.name || 'Unnamed user' }}</mat-card-title>
          </div>
          <app-status-badge
            [status]="user.status"
            [ariaLabel]="user.status === 'active' ? 'Active user' : 'Inactive user'"
          ></app-status-badge>
          @if (isMobile()) {
            <button
              appButton
              variant="danger"
              [iconOnly]="true"
              class="user-card__delete-mobile"
              (click)="onDelete(user, $event)"
              aria-label="Delete user"
            >
              <mat-icon svgIcon="lucide:trash-2" aria-hidden="true"></mat-icon>
            </button>
          }
        </div>
      </mat-card-header>

      <mat-card-content>
        <div class="user-card__meta">
          <div class="user-card__meta-item">
            <mat-icon svgIcon="lucide:mail" aria-hidden="true"></mat-icon>
            <span>{{ user.email }}</span>
          </div>
          <div class="user-card__meta-item">
            <mat-icon svgIcon="lucide:user" aria-hidden="true"></mat-icon>
            <span>{{ user.gender || '-' }}</span>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions align="end">
        <button
          appButton
          variant="ghost"
          type="button"
          [routerLink]="['/users', user.id]"
          aria-label="View user details"
        >
          <mat-icon svgIcon="lucide:eye" aria-hidden="true"></mat-icon>
          <span>View</span>
        </button>
        <button appButton variant="secondary" (click)="onEdit(user, $event)">
          <mat-icon svgIcon="lucide:pencil" aria-hidden="true"></mat-icon>
          <span>Edit</span>
        </button>
        @if (!isMobile()) {
          <button
            appButton
            variant="danger"
            [iconOnly]="true"
            class="user-card__delete-desktop"
            (click)="onDelete(user, $event)"
            aria-label="Delete user"
          >
            <mat-icon svgIcon="lucide:trash-2" aria-hidden="true"></mat-icon>
          </button>
        }
      </mat-card-actions>
    </mat-card>
  }
</div>
