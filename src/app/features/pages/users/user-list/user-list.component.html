<div class="user-list">
  @for (user of items(); track trackById($index, user)) {
    <mat-card class="user-card">
      <mat-card-header>
        <div class="user-card__heading">
          <div mat-card-avatar class="user-card__avatar" aria-hidden="true">
            {{ initials(user) }}
          </div>
          <div class="user-card__title-wrapper">
            <mat-card-title>{{ user.name || 'Unnamed user' }}</mat-card-title>
          </div>
          <span
            class="user-card__status"
            [class.user-card__status--active]="user.status === 'active'"
            [class.user-card__status--inactive]="user.status !== 'active'"
            role="img"
            [attr.aria-label]="user.status === 'active' ? 'Active user' : 'Inactive user'"
          >
            <mat-icon
              class="user-card__status-icon"
              [svgIcon]="user.status === 'active' ? 'lucide:check' : 'lucide:x'"
              aria-hidden="true"
            ></mat-icon>
            <span class="user-card__status-label">{{ user.status }}</span>
          </span>
        </div>
      </mat-card-header>

      <mat-card-content>
        <div class="user-card__meta">
          <div class="user-card__meta-item">
            <mat-icon svgIcon="lucide:mail" aria-hidden="true"></mat-icon>
            <span>{{ user.email }}</span>
          </div>
          <div class="user-card__meta-item">
            <mat-icon svgIcon="lucide:user" aria-hidden="true"></mat-icon>
            <span>{{ user.gender || '-' }}</span>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions align="end">
        <button mat-button (click)="onView(user, $event)">
          <mat-icon svgIcon="lucide:eye" aria-hidden="true"></mat-icon>
          <span>View</span>
        </button>
        <button mat-stroked-button (click)="onEdit(user, $event)">
          <mat-icon svgIcon="lucide:pencil" aria-hidden="true"></mat-icon>
          <span>Edit</span>
        </button>
        <button
          mat-icon-button
          color="warn"
          (click)="onDelete(user, $event)"
          aria-label="Delete user"
        >
          <mat-icon svgIcon="lucide:trash-2" aria-hidden="true"></mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  }
</div>
