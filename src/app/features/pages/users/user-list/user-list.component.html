<div class="user-list">
  @for (user of items(); track trackById($index, user)) {
    <article class="user-card">
      <header class="user-card__identity">
        <div class="user-card__avatar" aria-hidden="true">{{ initials(user) }}</div>

        <div class="user-card__identity-body">
          <h3 class="user-card__name">{{ user.name || 'Unnamed user' }}</h3>
          <span class="user-card__status user-card__status--{{ user.status }}">
            <lucide-icon
              [img]="user.status === 'active' ? Check : X"
              aria-hidden="true"
            ></lucide-icon>
            <span class="user-card__status-label">{{ user.status }}</span>
          </span>
        </div>
      </header>

      <dl class="user-card__meta">
        <div class="user-card__meta-item">
          <dt class="visually-hidden">Email</dt>
          <lucide-icon [img]="Mail" aria-hidden="true"></lucide-icon>
          <dd>{{ user.email }}</dd>
        </div>
        <div class="user-card__meta-item">
          <dt class="visually-hidden">Gender</dt>
          <lucide-icon [img]="UserIcon" aria-hidden="true"></lucide-icon>
          <dd>{{ user.gender || '-' }}</dd>
        </div>
      </dl>

      <footer class="user-card__actions">
        <button appButton variant="ghost" size="sm" (click)="onView(user, $event)">
          <lucide-icon [img]="Eye" aria-hidden="true"></lucide-icon>
          <span>View</span>
        </button>
        <button appButton variant="outline" size="sm" (click)="onEdit(user, $event)">
          <lucide-icon [img]="Pencil" aria-hidden="true"></lucide-icon>
          <span>Edit</span>
        </button>
        <button
          appButton
          variant="danger"
          size="sm"
          (click)="onDelete(user, $event)"
          aria-label="Delete user"
        >
          <lucide-icon [img]="Trash2" aria-hidden="true"></lucide-icon>
          <span class="visually-hidden">Delete</span>
        </button>
      </footer>
    </article>
  }
</div>
