<table class="users-table">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">Name</th>
      <th scope="col">Email</th>
      <th scope="col">Status</th>
      <th scope="col">Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (user of items; track trackById($index, user)) {
      <tr>
        <td data-column="ID">{{ user.id }}</td>
        <td data-column="Name">{{ user.name }}</td>
        <td data-column="Email">{{ user.email }}</td>
        <td data-column="Status">
          <span class="badge badge--{{ user.status }}">{{ user.status }}</span>
        </td>
        <td class="actions">
          <button
            type="button"
            class="action-button"
            (click)="edit.emit(user.id)"
            aria-label="Edit {{ user.name }}"
          >
            <lucide-icon [img]="Pencil" aria-hidden="true"></lucide-icon>
            <span class="visually-hidden">Edit</span>
          </button>
          <button
            type="button"
            class="action-button"
            (click)="delete.emit(user)"
            aria-label="Delete {{ user.name }}"
          >
            <lucide-icon [img]="Trash2" aria-hidden="true"></lucide-icon>
            <span class="visually-hidden">Delete</span>
          </button>
        </td>
      </tr>
    }
  </tbody>
</table>
