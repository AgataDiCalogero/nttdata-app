<div class="user-list">
  @for (user of items(); track trackById($index, user)) {
    <div class="user-card">
      <div class="user-card__avatar">{{ initials(user) }}</div>

      <div class="user-card__content">
        <h3 class="user-card__name">{{ user.name || 'Unnamed user' }}</h3>

        <span class="user-card__badge user-card__badge--{{ user.status }}">
          <lucide-icon [img]="user.status === 'active' ? Check : X"></lucide-icon>
          {{ user.status }}
        </span>

        <div class="user-card__meta">
          <div class="user-card__meta-item">
            <lucide-icon [img]="Mail"></lucide-icon>
            <span>{{ user.email }}</span>
          </div>
          <div class="user-card__meta-item">
            <lucide-icon [img]="UserIcon"></lucide-icon>
            <span>{{ user.gender || '-' }}</span>
          </div>
        </div>

        <div class="user-card__buttons">
          <button class="btn btn--view" (click)="$event.stopPropagation(); onView(user)">
            <lucide-icon [img]="Eye"></lucide-icon>
            <span>View</span>
          </button>
          <button class="btn btn--edit" (click)="$event.stopPropagation(); onEdit(user, $event)">
            <lucide-icon [img]="Pencil"></lucide-icon>
            <span>Edit</span>
          </button>
          <button
            class="btn btn--delete"
            (click)="$event.stopPropagation(); onDelete(user, $event)"
            aria-label="Delete user"
          >
            <lucide-icon [img]="Trash2"></lucide-icon>
          </button>
        </div>
      </div>
    </div>
  }
</div>
