<h2>Users</h2>

@if ($users | async; as users) {
  @if (users.length > 0) {
    <table class="users-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.id) {
          <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.status }}</td>
            <td>
              <button (click)="openDeleteDialog(user)" aria-label="Delete {{ user.name }}">
                <lucide-icon [img]="Trash2"></lucide-icon>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <p>No users found.</p>
  }
} @else {
  <p>Loading...</p>
}
@if (showDialog && selectedUser) {
  <app-delete-dialog [entityName]="selectedUser.name" (confirmDelete)="onDialogClose($event)">
  </app-delete-dialog>
}
