<section class="user-detail">
  @if (loading()) {
    <div class="loading">Caricamento...</div>
  } @else {
    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    @if (user()) {
      <div class="profile">
        <h2>{{ user()?.name }}</h2>
        <div class="info">
          <div>Email: {{ user()?.email }}</div>
          <div>Gender: {{ user()?.gender }}</div>
          <div>Status: {{ user()?.status }}</div>
        </div>
      </div>
    }

    <section class="user-posts">
      <h3>Post dell'utente</h3>

      @if (posts().length) {
        <ul class="posts-list">
          <template>
            @for (p of posts(); track p.id) {
              <li class="post-item">
                <h4>{{ p.title }}</h4>
                <p>{{ p.body }}</p>
                <button type="button" (click)="toggleComments(p.id)">
                  {{ commentsMap()[p.id] ? 'Nascondi commenti' : 'Mostra commenti' }}
                </button>

                @if (commentsMap()[p.id]) {
                  <div class="comments">
                    @if (commentsLoading()[p.id]) {
                      <div class="loading">Caricamento commenti...</div>
                    } @else {
                      <ul>
                        <template>
                          @for (c of commentsMap()[p.id]; track c.id) {
                            <li>
                              <strong>{{ c.name }}</strong> (<em>{{ c.email }}</em
                              >)
                              <p>{{ c.body }}</p>
                            </li>
                          }
                        </template>
                      </ul>
                    }
                  </div>
                }
              </li>
            }
          </template>
        </ul>
      } @else {
        <div class="empty">Nessun post disponibile</div>
      }
    </section>
  }
</section>
