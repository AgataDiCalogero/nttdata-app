@if (isChildRouteActive()) {
  <router-outlet></router-outlet>
} @else {
  <section class="users-page" data-app-page="true">
    <div class="users-container app-container app-container--full app-container--flush">
      <header class="users-page__header app-page__header">
        <div class="app-page__heading">
          <h1 class="app-page__title">Users</h1>
          <p class="app-subtitle">Manage and view all registered users</p>
        </div>
        <button
          appButton
          variant="primary"
          type="button"
          (click)="openNewUserModal()"
          aria-label="Create new user"
        >
          <mat-icon svgIcon="lucide:plus" aria-hidden="true"></mat-icon>
          <span>New User</span>
        </button>
      </header>

      <app-user-filters [showCreate]="false" (searchChange)="onSearch($event)"></app-user-filters>

      @if (displayed(); as data) {
        @if (loading()) {
          <div class="users-loader" aria-live="polite">
            <mat-progress-spinner
              mode="indeterminate"
              diameter="36"
              strokeWidth="3"
            ></mat-progress-spinner>
            <span>Loading users…</span>
          </div>
        } @else {
          @if (error(); as err) {
            <mat-card class="users-error" appearance="outlined">
              <mat-card-content>
                <div class="users-error__content">
                  <mat-icon svgIcon="lucide:alert-circle" aria-hidden="true"></mat-icon>
                  <p>{{ err }}</p>
                </div>
                <button
                  appButton
                  variant="ghost"
                  type="button"
                  (click)="clearError()"
                  [disabled]="loading()"
                >
                  Retry
                </button>
              </mat-card-content>
            </mat-card>
          } @else {
            @if (data.total > 0) {
              <div class="users-list-wrapper">
                <app-user-list
                  [items]="data.items"
                  (view)="goToDetail($event)"
                  (edit)="openEditUserModal($event)"
                  (delete)="onDelete($event)"
                ></app-user-list>

                <app-pagination
                  [page]="currentPage().page"
                  [pageCount]="totalPages(data.total)"
                  (pageChange)="setPage($event, currentPage().per_page)"
                />
              </div>
            } @else {
              <mat-card class="users-empty" appearance="outlined">
                <mat-card-content>
                  <mat-icon svgIcon="lucide:users" aria-hidden="true"></mat-icon>
                  <p>No users found.</p>
                  <a appButton variant="primary" routerLink="/users/new">Create first user</a>
                </mat-card-content>
              </mat-card>
            }
          }
        }
      }
    </div>
  </section>
}
