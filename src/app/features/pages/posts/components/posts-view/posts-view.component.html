<section class="posts-page" data-app-page="true">
  <div class="posts-container app-container app-container--full app-container--flush">
    <header class="posts-page__header app-page__header">
      <div class="app-page__heading">
        <h1 class="app-page__title">Posts</h1>
        <p class="app-page__meta">{{ postsCount() }} posts</p>
      </div>
      <button
        appButton
        variant="primary"
        type="button"
        (click)="createPost.emit()"
        aria-label="Create new post"
      >
        <mat-icon svgIcon="lucide:plus" aria-hidden="true"></mat-icon>
        <span>New Post</span>
      </button>
    </header>

    <app-posts-filters
      [searchForm]="searchForm()"
      [userOptions]="userOptions()"
      [perPageControl]="perPageControl"
      [perPageOptions]="perPageSelectOptions()"
      (perPageChange)="changePerPage.emit($event)"
      (resetFilters)="resetFilters.emit()"
    ></app-posts-filters>

    <!-- server errors are surfaced via global ToastService -->

    @if (loading()) {
      <app-loader class="posts-page__loader" [text]="'Loading posts...'"></app-loader>
    }

    @if (!loading() && !error() && posts().length === 0) {
      <app-alert variant="info" class="posts-page__alert">
        No posts match your filters yet. Try adjusting the search or refresh the list.
      </app-alert>
    }

    @if (!loading() && posts().length > 0) {
      <app-posts-list
        [posts]="posts()"
        [commentsMap]="commentsMap()"
        [commentsLoading]="commentsLoading()"
        [commentsCountMap]="commentsCountMap()"
        [deletingId]="deletingId()"
        [userLookup]="userLookup()"
        (deletePost)="deletePost.emit($event)"
        (toggleComments)="toggleComments.emit($event)"
        (commentCreated)="commentCreated.emit($event)"
        (commentUpdated)="commentUpdated.emit($event)"
        (editPost)="editPost.emit($event)"
        (viewAuthor)="viewAuthor.emit($event)"
      ></app-posts-list>
    }

    @if (hasPagination()) {
      <app-pagination
        [page]="currentPage()"
        [pageCount]="totalPages()"
        (pageChange)="changePage.emit($event)"
      >
        <!-- per-page select moved into the filters component -->
      </app-pagination>
    }
  </div>
</section>
