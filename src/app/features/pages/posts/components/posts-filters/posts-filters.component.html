<form class="posts-filters" [formGroup]="searchForm()" (submit)="$event.preventDefault()">
  <app-search-bar
    size="compact"
    [control]="$any(searchForm().get('title'))"
    [id]="searchId"
    placeholder="Search by title"
    label="Search posts by title"
  />
  <app-select
    [id]="userSelectId"
    [control]="$any(searchForm().get('user_id'))"
    [options]="userSelectOptions()"
  ></app-select>
  <app-select
    class="posts-filters__perpage"
    [id]="perPageSelectId"
    [control]="$any(perPageControl() ? perPageControl() : searchForm().get('perPage'))"
    [options]="perPageSelectOptions()"
    (selectionChange)="onPerPageChange($event)"
    [ariaLabel]="'Posts per page'"
    [showPlaceholder]="false"
  ></app-select>
  <button appButton variant="ghost" type="button" (click)="onReset()">Reset</button>
</form>
