@let formGroup = searchForm();

<form class="posts-filters" [formGroup]="formGroup" (submit)="$event.preventDefault()">
  <app-search-bar
    size="compact"
    [control]="formGroup.controls.title"
    [id]="searchId"
    placeholder="Search by title"
    label="Search posts by title"
  />
  <app-select
    [id]="userSelectId"
    [control]="formGroup.controls.user_id"
    [options]="userSelectOptions()"
  ></app-select>
  <app-select
    class="posts-filters__perpage"
    [id]="perPageSelectId"
    [control]="perPageControl()"
    [options]="perPageSelectOptions()"
    (selectionChange)="onPerPageChange($event)"
    [ariaLabel]="'Posts per page'"
    [showPlaceholder]="false"
  ></app-select>
  <button appButton variant="ghost" type="button" (click)="onReset()">Reset</button>
</form>
