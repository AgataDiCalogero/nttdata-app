<form class="posts-filters" [formGroup]="searchForm" (submit)="$event.preventDefault()">
  <input
    type="search"
    formControlName="title"
    placeholder="Search by title"
    aria-label="Search by title"
  />
  <select formControlName="userId" aria-label="Filter by author">
    <option [ngValue]="0">All authors</option>
    @for (user of userOptions; track user.id) {
      <option [ngValue]="user.id">{{ user.name }}</option>
    }
  </select>
  <button appButton variant="ghost" type="button" (click)="onReset()">Reset</button>
</form>
