<app-card class="posts-card" [interactive]="interactive()" [padding]="padding()">
  @let p = post();
  @let deleting = isDeleting();
  @let c = comments() ?? null;

  <div card-header>
    <div class="card__title posts-card__title">
      <h3>{{ p?.title }}</h3>
      <span class="card__meta">Author: {{ p?.user_id }}</span>
    </div>

    <div class="card__actions">
      <button
        appButton
        variant="ghost"
        size="sm"
        type="button"
        class="posts-card__delete"
        (click)="delete.emit()"
        [disabled]="deleting"
        aria-label="Delete {{ p?.title }}"
      >
        <lucide-icon [img]="Trash2"></lucide-icon>
      </button>
    </div>
  </div>

  <div card-body>
    <div class="post-content" [class.post-content--truncated]="shouldTruncate() && !isExpanded">
      <p class="post-content__text">{{ p?.body }}</p>

      @if (shouldTruncate()) {
        <button type="button" class="post-content__toggle" (click)="toggleExpansion()">
          {{ isExpanded ? 'Show less' : 'Read more' }}
        </button>
      }
    </div>
  </div>

  <div card-footer>
    <button
      appButton
      variant="ghost"
      type="button"
      (click)="toggleComments.emit()"
      [attr.aria-expanded]="c ? 'true' : 'false'"
    >
      <lucide-icon [img]="MessageSquare"></lucide-icon>
      {{ c ? 'Hide comments' : 'Show comments' }}
    </button>
  </div>
</app-card>
